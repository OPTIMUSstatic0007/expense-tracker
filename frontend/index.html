<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Professional Accounting</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <span class="brand">ExpenseTracker <span class="brand-sub">Professional</span></span>
            <div class="user-profile">
                <span>Accountant View</span>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <!-- Summary Dashboard -->
        <section class="summary-grid">
            <div class="stat-card">
                <span class="stat-label">Net Balance</span>
                <span class="stat-value" id="balance">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Credits</span>
                <span class="stat-value credit-text" id="total-credit">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Debits</span>
                <span class="stat-value debit-text" id="total-debit">$0.00</span>
            </div>
        </section>

        <div class="content-layout">
            <!-- Data Entry Section -->
            <section class="form-section">
                <div class="section-header">
                    <h2>Record Transaction</h2>
                </div>
                <form id="exp-form" class="transaction-form">
                    <div class="input-grid">
                        <div class="field">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="field">
                            <label for="type">Type</label>
                            <select id="type" required>
                                <option value="Credit">Credit</option>
                                <option value="Debit">Debit</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="field">
                            <label for="category">Category</label>
                            <input type="text" id="category" placeholder="e.g. Utility" required>
                        </div>
                        <div class="field">
                            <label for="source">Source</label>
                            <input type="text" id="source" placeholder="Bank/Cash" required>
                        </div>
                        <div class="field">
                            <label for="person">Person</label>
                            <input type="text" id="person" placeholder="Payee/Payer">
                        </div>
                    </div>
                    <div class="field notes-field">
                        <label for="notes">Internal Notes</label>
                        <textarea id="notes" rows="2" placeholder="Reference details..."></textarea>
                    </div>
                    <button type="submit" id="save-btn" class="btn-primary">Post Transaction</button>
                </form>
            </section>

            <!-- Ledger/History Section -->
            <section class="history-section">
                <div class="section-header">
                    <h2>General Ledger</h2>
                </div>
                <div class="table-wrapper">
                    <table id="history-table" class="ledger-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description/Category</th>
                                <th>Source</th>
                                <th>Type</th>
                                <th class="text-right">Debit</th>
                                <th class="text-right">Credit</th>
                                <th class="text-right">Balance</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Transactions rendered via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
